<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --warn: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #2d3148;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  header { text-align: center; max-width: 680px; width: 100%; margin-bottom: 32px; padding-top: 16px; }
  header .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #0f1117; font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 4px 14px; border-radius: 999px; margin-bottom: 14px;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 5vw, 40px); line-height: 1.15;
    background: linear-gradient(135deg, #e2e8f0 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 10px;
  }
  header p { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .lang-switcher { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
  .lang-btn {
    padding: 7px 18px; border-radius: 999px;
    border: 1.5px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .lang-btn:hover { border-color: var(--accent2); color: var(--text); }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,0.08); font-weight: 600; }

  /* PROGRESS */
  .progress-wrap { max-width: 680px; width: 100%; margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  /* CARD */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px;
    max-width: 680px; width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
  .question-text { font-family: 'DM Serif Display', serif; font-size: clamp(18px,3.5vw,24px); line-height: 1.4; color: var(--text); margin-bottom: 28px; min-height: 70px; }
  .voice-controls { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  .btn-voice {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-voice:hover { border-color: var(--accent); color: var(--accent); }
  .btn-voice.playing { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,0.08); }
  .btn-voice svg { width: 16px; height: 16px; flex-shrink: 0; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: 12px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; text-align: left; transition: all 0.2s; width: 100%;
  }
  .opt-btn:hover { border-color: var(--accent2); background: rgba(129,140,248,0.06); }
  .opt-btn.selected { border-color: var(--accent); background: rgba(110,231,183,0.08); color: var(--accent); }
  .opt-letter {
    width: 28px; height: 28px; border-radius: 8px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0; transition: all 0.2s;
  }
  .opt-btn.selected .opt-letter { background: var(--accent); color: var(--bg); }
  .scale-wrap { display: flex; flex-direction: column; gap: 14px; }
  .scale-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .scale-label { font-size: 12px; color: var(--muted); min-width: 40px; }
  .scale-label.right { text-align: right; }
  .scale-btns { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; justify-content: center; }
  .scale-btn {
    width: 40px; height: 40px; border-radius: 10px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .scale-btn:hover { border-color: var(--accent2); }
  .scale-btn.selected { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .text-input {
    width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 14px 18px; outline: none; transition: border-color 0.2s;
  }
  .text-input:focus { border-color: var(--accent2); }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; gap: 12px; }
  .btn-nav { display: flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 999px; border: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-back { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-back:not(:disabled):hover { color: var(--text); border-color: var(--muted); }
  .btn-next { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: var(--bg); }
  .btn-next:not(:disabled):hover { opacity: 0.88; transform: scale(1.02); }
  .btn-next:disabled { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* FINAL */
  .final-screen { text-align: center; max-width: 680px; width: 100%; animation: fadeIn 0.5s ease; }
  .final-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--accent2), var(--accent)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; font-size: 36px; }
  .final-screen h2 { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 12px; background: linear-gradient(135deg, #e2e8f0, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .final-screen > p { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 28px; margin-bottom: 16px; text-align: left; }
  .result-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .result-card p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .result-card.success { border-color: rgba(110,231,183,0.4); background: rgba(110,231,183,0.05); }
  .result-card.error { border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.05); }
  .btn-action {
    display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px;
    border-radius: 999px; background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-action:hover { opacity: 0.88; }
  .btn-restart {
    display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
    border-radius: 999px; background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn-restart:hover { color: var(--warn); border-color: var(--warn); }
  .notice { font-size: 12px; color: var(--muted); text-align: center; margin-top: 20px; line-height: 1.5; }
  .sending-overlay {
    position: fixed; inset: 0; background: rgba(15,17,23,0.85);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; gap: 16px;
  }
  .sending-overlay p { color: var(--text); font-size: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .speaking { animation: pulse 1.2s infinite; }
  .freq-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media(max-width: 480px) { .freq-opts { grid-template-columns: 1fr; } }
</style>
</head>

// ── URL CONFIG ───────────────────────────────────────────────────────────
function getScriptUrl() { return 'https://script.google.com/macros/s/AKfycbzwJhXIsPZqCMgtKIJqQ788-SYAxaBKTBWYmKAJ1wFi_mx_o2QBtVzuWzrBKkBTWhF2/exec'; }

// ── STATE ────────────────────────────────────────────────────────────────
let current = 0;
let answers = {};
let synth = window.speechSynthesis;
let selectedVoicePt = null;
let selectedVoiceEs = null;

function T(key) { return LANGS[lang][key] || LANGS.pt[key]; }
function qText(q) { return lang === 'es' ? q.es : q.pt; }
function qSection(q) { return lang === 'es' ? q.sectionEs : q.section; }
function qOpts(q) { return lang === 'es' && q.optsEs ? q.optsEs : q.opts; }
function freqLabel(f) { return lang === 'es' ? f.labelEs : f.label; }

// ── LANGUAGE SWITCHER ─────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  if (document.getElementById('q-card').style.display !== 'none') render();
}

// ── VOICE SETUP ───────────────────────────────────────────────────────────
function loadVoices() {
  const voices = synth.getVoices();
  // Prefer natural/neural voices for PT
  selectedVoicePt = voices.find(v => v.lang.startsWith('pt') && /natural|neural|google|microsoft/i.test(v.name))
    || voices.find(v => v.lang === 'pt-BR')
    || voices.find(v => v.lang.startsWith('pt'))
    || null;
  // Prefer natural/neural voices for ES
  selectedVoiceEs = voices.find(v => v.lang.startsWith('es') && /natural|neural|google|microsoft/i.test(v.name))
    || voices.find(v => v.lang === 'es-ES' || v.lang === 'es-MX' || v.lang === 'es-419')
    || voices.find(v => v.lang.startsWith('es'))
    || null;
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

// ── RENDER ───────────────────────────────────────────────────────────────
function render() {
  const q = questions[current];
  const card = document.getElementById('q-card');
  card.style.display = '';
  document.getElementById('final-screen').style.display = 'none';

  const pct = Math.round((current / questions.length) * 100);
  const ofWord = lang === 'es' ? 'de' : 'de';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = qSection(q) + ' · ' + (current + 1) + ' ' + ofWord + ' ' + questions.length;

  const saved = answers[q.id];
  let html = `
    <div class="section-label">${qSection(q)}</div>
    <div class="question-text">${qText(q)}</div>
    <div class="voice-controls">
      <button class="btn-voice" id="btn-speak" onclick="speakQuestion()">
        ${iconSpeaker()} <span id="speak-label">${T('listen')}</span>
      </button>
      <button class="btn-voice" onclick="stopSpeech()">
        ${iconStop()} ${T('stop')}
      </button>
    </div>
    <div id="answer-area">`;

  if (q.type === 'text') {
    const ph = lang === 'es' ? 'Escriba aquí...' : 'Digite aqui...';
    if (q.id === 'data') {
      html += `<input class="text-input" id="text-ans" type="text" placeholder="dd/mm/aaaa" maxlength="10" value="${saved||''}" oninput="maskDate(this)">`;
    } else {
      html += `<input class="text-input" id="text-ans" type="text" placeholder="${q.placeholder||ph}" value="${saved||''}" oninput="answers['${q.id}']=this.value">`;
    }
  } else if (q.type === 'choice') {
    const opts = qOpts(q);
    html += `<div class="options">`;
    opts.forEach((o, i) => {
      const sel = saved === o ? 'selected' : '';
      html += `<button class="opt-btn ${sel}" onclick="selectOpt('${q.id}','${o.replace(/'/g,"\\'")}',this)">
        <span class="opt-letter">${String.fromCharCode(65+i)}</span>${o}</button>`;
    });
    html += `</div>`;
  } else if (q.type === 'freq') {
    html += `<div class="options freq-opts">`;
    FREQ_OPTIONS.forEach((f, i) => {
      const label = freqLabel(f);
      const sel = saved === label ? 'selected' : '';
      html += `<button class="opt-btn ${sel}" onclick="selectOpt('${q.id}','${label.replace(/'/g,"\\'")}',this)">
        <span class="opt-letter">${f.emoji}</span>${label}</button>`;
    });
    html += `</div>`;
  } else if (q.type === 'scale10') {
    html += `<div class="scale-wrap"><div class="scale-row">
      <span class="scale-label">0</span><div class="scale-btns">`;
    for (let i = 1; i <= 10; i++) {
      const sel = saved == i ? 'selected' : '';
      html += `<button class="scale-btn ${sel}" onclick="selectScale('${q.id}',${i},this)">${i}</button>`;
    }
    html += `</div><span class="scale-label right">10</span></div></div>`;
  }

  html += `</div>`;
  const isLast = current === questions.length - 1;
  html += `<div class="nav-row">
    <button class="btn-nav btn-back" onclick="goBack()" ${current===0?'disabled':''}>${T('prev')}</button>
    <button class="btn-nav btn-next" onclick="goNext()">${isLast ? T('finish') : T('next')}</button>
  </div>`;

  card.innerHTML = html;
  setTimeout(() => speakQuestion(), 300);
}

function selectOpt(id, val, btn) {
  answers[id] = val;
  btn.closest('.options').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
function selectScale(id, val, btn) {
  answers[id] = val;
  btn.closest('.scale-btns').querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
function goNext() {
  const q = questions[current];
  if (q.type === 'text') {
    const el = document.getElementById('text-ans');
    if (el) answers[q.id] = el.value;
  }
  stopSpeech();
  if (current < questions.length - 1) {
    current++; render(); window.scrollTo({top:0,behavior:'smooth'});
  } else {
    submitAndFinish();
  }
}
function goBack() {
  stopSpeech();
  if (current > 0) { current--; render(); window.scrollTo({top:0,behavior:'smooth'}); }
}

// ── SUBMIT TO GOOGLE SHEETS ──────────────────────────────────────────────
async function submitAndFinish() {
  const scriptUrl = getScriptUrl();
  document.getElementById('q-card').style.display = 'none';

  const headers = ['Data/Hora Envio', 'Idioma', ...questions.map(q => q.pt)];
  const values  = [new Date().toLocaleString('pt-BR'), lang === 'es' ? 'Español' : 'Português', ...questions.map(q => answers[q.id] || '')];
  const SECRET  = 'copsoq2025seguro';

  document.getElementById('final-screen').style.display = '';
  document.getElementById('final-title').textContent = T('finalTitle');
  document.getElementById('final-sub').textContent = T('finalSub');
  document.getElementById('restart-btn').textContent = T('restart');
  document.getElementById('final-notice').textContent = T('notice');
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-pct').textContent = '100%';
  document.getElementById('prog-label').textContent = T('progDone');

  const resultDiv = document.getElementById('submit-result');

  if (!scriptUrl) {
    resultDiv.innerHTML = `
      <div class="result-card error">
        <h3>${T('noUrlTitle')}</h3>
        <p>${T('noUrlDesc')}</p>
        <button class="btn-action" onclick="downloadCSV()">${T('downloadBtn')}</button>
      </div>`;
    return;
  }

  const overlay = document.createElement('div');
  overlay.className = 'sending-overlay';
  overlay.innerHTML = `<div class="spinner"></div><p>${T('sending')}</p>`;
  document.body.appendChild(overlay);

  try {
    await fetch(scriptUrl, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ secret: SECRET, headers, values })
    });
  } catch (err) {
    // no-cors fetch rarely throws; ignore
  }

  overlay.remove();
  resultDiv.innerHTML = `
    <div class="result-card success">
      <h3>${T('sendOkTitle')}</h3>
      <p>${T('sendOkDesc')}</p>
      <button class="btn-action" onclick="downloadCSV()">${T('downloadAlso')}</button>
    </div>`;
}

// ── CSV ───────────────────────────────────────────────────────────────────
function downloadCSV() {
  let csv = 'Campo,Resposta\n';
  csv += `"Data/Hora","${new Date().toLocaleString('pt-BR')}"\n`;
  csv += `"Idioma","${lang === 'es' ? 'Español' : 'Português'}"\n`;
  questions.forEach(q => {
    const ans = answers[q.id] || '';
    csv += `"${q.pt.replace(/"/g,'""')}","${String(ans).replace(/"/g,'""')}"\n`;
  });
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `copsoq_${Date.now()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function restartAll() { current = 0; answers = {}; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function maskDate(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 8);
  if (v.length >= 5) v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
  else if (v.length >= 3) v = v.slice(0,2) + '/' + v.slice(2);
  el.value = v;
  answers['data'] = v;
}

// ── VOICE (natural, humanized) ────────────────────────────────────────────
function speakQuestion() {
  stopSpeech();
  const q = questions[current];
  const text = qText(q);

  // Build natural speech — pause after question, then list options conversationally
  let parts = [];
  parts.push(text);

  if (q.type === 'freq') {
    const prefix = lang === 'es' ? 'Las opciones son:' : 'As opções são:';
    parts.push(prefix);
    FREQ_OPTIONS.forEach((f, i) => {
      parts.push(freqLabel(f));
    });
  } else if (q.type === 'choice') {
    const opts = qOpts(q);
    const prefix = lang === 'es' ? 'As opções são:' : 'As opções são:';
    parts.push(prefix);
    opts.forEach(o => parts.push(o));
  } else if (q.type === 'scale10') {
    parts.push(T('scaleHint'));
  }

  const fullText = parts.join(' ... ');

  const voices = synth.getVoices();
  const voice = lang === 'es' ? selectedVoiceEs : selectedVoicePt;

  const u = new SpeechSynthesisUtterance(fullText);
  u.lang = T('code');
  u.rate = 0.88;
  u.pitch = 1.05;
  u.volume = 1;
  if (voice) u.voice = voice;

  const btn = document.getElementById('btn-speak');
  const lbl = document.getElementById('speak-label');
  if (btn) btn.classList.add('playing','speaking');
  if (lbl) lbl.textContent = T('playing');
  u.onend = u.onerror = () => {
    if (btn) btn.classList.remove('playing','speaking');
    if (lbl) lbl.textContent = T('listen');
  };
  synth.speak(u);
}

function stopSpeech() {
  synth.cancel();
  const btn = document.getElementById('btn-speak');
  const lbl = document.getElementById('speak-label');
  if (btn) btn.classList.remove('playing','speaking');
  if (lbl) lbl.textContent = T('listen');
}

function iconSpeaker() { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`; }
function iconStop() { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`; }

// ── INIT ─────────────────────────────────────────────────────────────────
  
render();
</script>
